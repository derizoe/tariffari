<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Tariffe FedEx IPE</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4a4aff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background: #2e2ee6;
        }

        input[type="number"] {
            padding: 8px;
            margin: 5px 0;
            width: 150px;
        }

        #colliContainer div {
            margin-bottom: 10px;
        }

        #risultato {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Calcolatore Tariffe FedEx IPE</h1>

    <div class="box">
        <h2>Inserisci i colli</h2>

        <button id="addCollo">+ Aggiungi collo</button>
        <button id="calcola">Calcola tariffa</button>

        <div id="colliContainer"></div>

        <div id="risultato"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
